<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语场景学习 App - 高保真原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8 min-h-screen">
    <header class="mb-12 text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">日语场景学习 App</h1>
        <p class="text-gray-600">极简日系风格 x 星露谷像素风 UI 设计原型</p>
    </header>

    <div class="flex flex-wrap justify-center gap-12">
        <!-- Page 1 -->
        <div class="flex flex-col items-center">
            <span class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-500">页面 1：搜索首页</span>
            <div class="iphone-frame">
                <div class="dynamic-island"></div>
                <iframe src="home.html" class="w-full h-full border-none" title="Home"></iframe>
            </div>
        </div>

        <!-- Page 2 -->
        <div class="flex flex-col items-center">
            <span class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-500">页面 2：解析详情</span>
            <div class="iphone-frame">
                <div class="dynamic-island"></div>
                <iframe src="analysis.html" class="w-full h-full border-none" title="Analysis"></iframe>
            </div>
        </div>

        <!-- Page 3 -->
        <div class="flex flex-col items-center">
            <span class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-500">页面 3：对话实验室</span>
            <div class="iphone-frame">
                <div class="dynamic-island"></div>
                <iframe src="lab.html" class="w-full h-full border-none" title="Lab"></iframe>
            </div>
        </div>

        <!-- Page 4 -->
        <div class="flex flex-col items-center">
            <span class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-500">页面 4：归档复习</span>
            <div class="iphone-frame">
                <div class="dynamic-island"></div>
                <iframe src="archive.html" class="w-full h-full border-none" title="Archive"></iframe>
            </div>
        </div>

        <!-- Page 5: AI Assistant -->
        <div class="flex flex-col items-center">
            <span class="mb-4 text-sm font-semibold uppercase tracking-wider text-gray-500">页面 5：AI 助手聊天</span>
            <div class="iphone-frame">
                <div class="dynamic-island"></div>
                <iframe src="chat.html" class="w-full h-full border-none" title="Chat"></iframe>
            </div>
        </div>
    </div>

    <footer class="mt-20 text-center text-gray-400 text-sm">
        <p>© 2026 日语场景实验室 - 设计原型由 Trae 生成</p>
    </footer>
</body>
</html>
