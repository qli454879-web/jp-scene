<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #F9F9F7;
            color: #333333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            width: fit-content;
        }
        .dot {
            width: 4px;
            height: 4px;
            background: #ccc;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="pt-12">
    <!-- Header -->
    <header class="px-6 py-4 bg-white border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white text-xl">
                <i class="fa-solid fa-sparkles"></i>
            </div>
            <div>
                <h2 class="font-bold text-sm">AI 场景助手</h2>
                <p class="text-[10px] text-green-500 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> 随时待命
                </p>
            </div>
        </div>
        <a href="home.html" class="text-gray-400"><i class="fa-solid fa-xmark"></i></a>
    </header>

    <!-- Chat Messages -->
    <main id="chatMessages" class="chat-container">
        <div class="chat-bubble-ai">
            你好！我是你的 AI 场景助手。除了查单词，你还可以问我任何关于日语学习、文化、或是复杂的语法问题。
        </div>
        <!-- Messages will be injected here -->
    </main>

    <!-- Input Area -->
    <footer class="p-4 bg-white border-t border-gray-100 mb-4">
        <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-100">
            <button class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-plus"></i>
            </button>
            <input type="text" placeholder="问问复杂的语法或文化吧..." class="flex-grow bg-transparent border-none outline-none text-sm">
            <button class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-paper-plane text-xs"></i>
            </button>
        </div>
    </footer>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <a href="home.html" class="tab-item">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span>Home</span>
        </a>
        <a href="chat.html" class="tab-item active">
            <i class="fa-solid fa-comment-dots text-xl mb-1"></i>
            <span>Assistant</span>
        </a>
        <a href="archive.html" class="tab-item">
            <i class="fa-solid fa-calendar-days text-xl mb-1"></i>
            <span>Memory</span>
        </a>
    </div>

    <script>
        const chatContainer = document.getElementById('chatMessages');
        
        async function appendMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? 'chat-bubble-user' : 'chat-bubble-ai';
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function askAI(question) {
            appendMessage(question, true);
            
            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'typing-indicator shadow-sm border border-gray-50';
            typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch(`/api/chat?q=${encodeURIComponent(question)}`);
                const data = await res.json();
                typing.remove();
                appendMessage(data.answer);
            } catch (e) {
                typing.remove();
                appendMessage("抱歉，AI 暂时无法连接。");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const initialQ = urlParams.get('q');
            if (initialQ) {
                askAI(initialQ);
            }
        });

        // Add input event listener
        const sendBtn = document.querySelector('.bg-green-500');
        const input = document.querySelector('input');
        
        sendBtn.addEventListener('click', () => {
            if (input.value.trim()) {
                askAI(input.value.trim());
                input.value = '';
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                askAI(input.value.trim());
                input.value = '';
            }
        });
    </script>
</body>
</html>
